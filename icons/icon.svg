<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#10b981"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Inset highlight at top edge -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (gradient) -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Subtle top-edge shine -->
  <rect width="512" height="256" rx="112" ry="112" fill="url(#shine)"/>

  <!-- Golf course artwork, scaled from 48×48 viewBox to sit centred in 512×512 -->
  <!-- Scale factor: 512/48 ≈ 10.667 — translate to centre with 0 offset since viewBox fills -->
  <g transform="translate(256,256) scale(8) translate(-24,-24)">
    <!-- Golf green -->
    <ellipse cx="24" cy="28" rx="18" ry="14" fill="#2d8f52" opacity="0.9"/>
    <ellipse cx="24" cy="28" rx="14" ry="10" fill="#34d399" opacity="0.35"/>
    <!-- Fairway -->
    <path d="M20 42 Q24 35 28 42 L32 48 L16 48 Z" fill="#1a6b3c" opacity="0.65"/>
    <!-- Flag pole -->
    <line x1="26" y1="28" x2="26" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Flag -->
    <path d="M26 8 L36 12 L26 16 Z" fill="#f43f5e"/>
    <!-- Hole -->
    <circle cx="26" cy="28" r="2" fill="#050a12" stroke="white" stroke-width="0.8"/>
    <!-- Sand bunker -->
    <ellipse cx="12" cy="32" rx="5" ry="3" fill="#fbbf24" opacity="0.45"/>
    <!-- Water hazard -->
    <ellipse cx="38" cy="34" rx="4" ry="2.5" fill="#06b6d4" opacity="0.45"/>
  </g>
</svg>
