<!DOCTYPE html>
<html>
<head><title>Icon Generator — APPROACH IQ</title></head>
<body style="font-family:sans-serif; padding:2rem; background:#050a12; color:#f1f5f9;">
  <h2>APPROACH IQ — Icon Generator</h2>
  <p>Click the buttons below to download the required PNG icons, then save them into this <code>icons/</code> folder.</p>

  <div style="display:flex; gap:2rem; margin-top:1.5rem; flex-wrap:wrap;">
    <div>
      <canvas id="c192" width="192" height="192" style="border-radius:42px; display:block;"></canvas>
      <button onclick="download('c192','icon-192.png')" style="margin-top:0.5rem; padding:0.5rem 1rem; cursor:pointer;">
        Download icon-192.png
      </button>
    </div>
    <div>
      <canvas id="c512" width="512" height="512" style="border-radius:112px; display:block;"></canvas>
      <button onclick="download('c512','icon-512.png')" style="margin-top:0.5rem; padding:0.5rem 1rem; cursor:pointer;">
        Download icon-512.png
      </button>
    </div>
    <div>
      <canvas id="c180" width="180" height="180" style="border-radius:40px; display:block;"></canvas>
      <button onclick="download('c180','apple-touch-icon.png')" style="margin-top:0.5rem; padding:0.5rem 1rem; cursor:pointer;">
        Download apple-touch-icon.png
      </button>
    </div>
  </div>

  <script>
    function drawIcon(canvas) {
      const s = canvas.width;
      const ctx = canvas.getContext('2d');
      const r = s * 0.22; // corner radius

      // Background gradient
      const grad = ctx.createLinearGradient(0, 0, s, s);
      grad.addColorStop(0,    '#10b981');
      grad.addColorStop(0.5,  '#06b6d4');
      grad.addColorStop(1,    '#3b82f6');

      // Rounded rect clip
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.save();
      ctx.clip();

      // Shine overlay
      const shine = ctx.createLinearGradient(0, 0, 0, s * 0.5);
      shine.addColorStop(0, 'rgba(255,255,255,0.18)');
      shine.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = shine;
      ctx.fillRect(0, 0, s, s * 0.5);

      // Scale factor: artwork is in a 48×48 viewBox, centred in canvas
      const scale = s / 48 * 0.85;
      const ox = (s - 48 * scale) / 2;
      const oy = (s - 48 * scale) / 2;
      ctx.translate(ox, oy);
      ctx.scale(scale, scale);

      // Golf green
      drawEllipse(ctx, 24, 28, 18, 14, 'rgba(45,143,82,0.9)');
      drawEllipse(ctx, 24, 28, 14, 10, 'rgba(52,211,153,0.35)');

      // Fairway
      ctx.beginPath();
      ctx.moveTo(20, 42);
      ctx.quadraticCurveTo(24, 35, 28, 42);
      ctx.lineTo(32, 48);
      ctx.lineTo(16, 48);
      ctx.closePath();
      ctx.fillStyle = 'rgba(26,107,60,0.65)';
      ctx.fill();

      // Flag pole
      ctx.beginPath();
      ctx.moveTo(26, 28);
      ctx.lineTo(26, 8);
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.stroke();

      // Flag
      ctx.beginPath();
      ctx.moveTo(26, 8);
      ctx.lineTo(36, 12);
      ctx.lineTo(26, 16);
      ctx.closePath();
      ctx.fillStyle = '#f43f5e';
      ctx.fill();

      // Hole
      ctx.beginPath();
      ctx.arc(26, 28, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#050a12';
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 0.8;
      ctx.stroke();

      // Sand bunker
      drawEllipse(ctx, 12, 32, 5, 3, 'rgba(251,191,36,0.45)');

      // Water hazard
      drawEllipse(ctx, 38, 34, 4, 2.5, 'rgba(6,182,212,0.45)');

      ctx.restore();
    }

    function drawEllipse(ctx, cx, cy, rx, ry, color) {
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = filename;
      a.click();
    }

    // Draw all sizes on load
    ['c192', 'c512', 'c180'].forEach(id => drawIcon(document.getElementById(id)));
  </script>
</body>
</html>
